name: kidneyshield
description: "KidneyShield - Kidney Stone Prevention & Tracker App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  # image_picker removed — unused in v1.0 (re-add when photo feature ships)
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4
  fl_chart: ^0.69.0
  shared_preferences: ^2.5.5
  permission_handler: ^11.3.1
  cupertino_icons: ^1.0.8
  # animated_splash_screen removed — abandonware (last update 2021);
  #   replaced by custom SplashScreen in lib/screens/splash_screen.dart
  google_mobile_ads: ^5.1.0
  share_plus: ^10.0.0
  pdf: ^3.12.0
  printing: ^5.14.3
  url_launcher: ^6.3.0
  sqflite_sqlcipher: ^3.4.0
  path: ^1.9.0
  confetti: ^0.7.0
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.2
  encrypt: ^5.0.3
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0d1f2d"
  adaptive_icon_foreground: "assets/app_icon.png"
