name: stoneguard
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.2.1
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4
  fl_chart: ^0.69.0
  shared_preferences: ^2.5.5
  permission_handler: ^11.3.1
  cupertino_icons: ^1.0.8
  animated_splash_screen: ^1.3.0
  google_mobile_ads: ^8.0.0
  share_plus: ^10.0.0
  pdf: ^3.12.0
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0d1f2d"
  adaptive_icon_foreground: "assets/app_icon.png"